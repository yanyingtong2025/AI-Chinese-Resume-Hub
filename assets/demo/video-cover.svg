<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">功能演示视频封面</title>
  <desc id="desc">点击封面可打开功能演示视频</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="45%" stop-color="#164e63" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
  <circle cx="1040" cy="120" r="180" fill="#22d3ee" opacity="0.16" />
  <circle cx="180" cy="610" r="220" fill="#60a5fa" opacity="0.14" />
  <rect x="110" y="96" width="1060" height="528" rx="36" fill="#0b1120" opacity="0.55" filter="url(#shadow)" />

  <text x="640" y="215" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="58" font-weight="700" fill="#ffffff">功能演示视频</text>
  <text x="640" y="278" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" fill="#dbeafe">点击封面即可打开完整演示</text>

  <circle cx="640" cy="420" r="96" fill="url(#accent)" opacity="0.95" filter="url(#shadow)" />
  <polygon points="612,380 612,460 688,420" fill="#ffffff" />

  <rect x="290" y="520" width="700" height="10" rx="5" fill="#93c5fd" opacity="0.45" />
  <text x="640" y="580" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="22" fill="#cbd5e1">DeepSeek 解析 · 六维评分 · 岗位匹配 · 求职者 / HR 双向平台</text>
</svg>