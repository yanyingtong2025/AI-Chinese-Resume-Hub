{% extends 'base.html' %}

{% block title %}登录 - 智能简历筛选系统{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        max-width: 450px;
        margin: 80px auto;
    }

    .login-card {
        background: white;
        border-radius: 15px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .login-title {
        text-align: center;
        font-size: 28px;
        color: #333;
        margin-bottom: 10px;
    }

    .login-subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        background: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn-login:hover {
        background: #2980b9;
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(52,152,219,0.3);
    }

    .register-link {
        text-align: center;
        margin-top: 20px;
        color: #666;
    }

    .register-link a {
        color: #3498db;
        text-decoration: none;
        font-weight: 500;
    }

    .register-link a:hover {
        color: #2980b9;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <h2 class="login-title">欢迎登录</h2>
        <p class="login-subtitle">基于AI的智能简历筛选系统</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn-login">登录</button>
        </form>

        <div class="register-link">
            还没有账号？<a href="{% url 'register' %}">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
